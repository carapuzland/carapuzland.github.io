<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarapuzLand 🏝️</title>
    <style>
        /* ============ CSS VARIABLES & THEMES ============ */
        :root {
            --transition-speed: 0.4s;
        }

        [data-theme="dark"] {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.85);
            --bg-header: rgba(10, 14, 26, 0.92);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-accent: #38bdf8;
            --ocean-top: #0a1628;
            --ocean-mid: #0c2340;
            --ocean-bottom: #0d3b66;
            --island-sand: #c2a54f;
            --island-green: #2d6a4f;
            --island-dark-green: #1b4332;
            --wave-color: rgba(56, 189, 248, 0.08);
            --border-color: rgba(56, 189, 248, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --dropdown-bg: #1e293b;
            --dropdown-hover: #334155;
            --glow: rgba(56, 189, 248, 0.3);
            --star-color: #ffffff;
            --cloud-color: rgba(255,255,255,0.03);
            --foam-color: rgba(255,255,255,0.15);
            --tooltip-bg: rgba(15, 23, 42, 0.95);
        }

        [data-theme="light"] {
            --bg-primary: #e0f2fe;
            --bg-secondary: #f0f9ff;
            --bg-card: rgba(255, 255, 255, 0.88);
            --bg-header: rgba(224, 242, 254, 0.94);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-accent: #0284c7;
            --ocean-top: #7dd3fc;
            --ocean-mid: #38bdf8;
            --ocean-bottom: #0ea5e9;
            --island-sand: #e8d44d;
            --island-green: #22c55e;
            --island-dark-green: #15803d;
            --wave-color: rgba(255, 255, 255, 0.2);
            --border-color: rgba(2, 132, 199, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.15);
            --dropdown-bg: #ffffff;
            --dropdown-hover: #f1f5f9;
            --glow: rgba(2, 132, 199, 0.25);
            --star-color: transparent;
            --cloud-color: rgba(255,255,255,0.6);
            --foam-color: rgba(255,255,255,0.5);
            --tooltip-bg: rgba(30, 41, 59, 0.92);
        }

        /* ============ RESET & BASE ============ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background var(--transition-speed), color var(--transition-speed);
            min-height: 100vh;
        }

        /* ============ HEADER ============ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bg-header);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background var(--transition-speed), border-color var(--transition-speed);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            user-select: none;
        }

        .header-logo .emoji {
            font-size: 1.6rem;
            animation: float-logo 3s ease-in-out infinite;
        }

        @keyframes float-logo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* ============ THEME TOGGLE ============ */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            border-color: var(--text-accent);
            box-shadow: 0 0 12px var(--glow);
            transform: rotate(20deg);
        }

        /* ============ LANGUAGE DROPDOWN ============ */
        .lang-dropdown {
            position: relative;
        }

        .lang-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: all 0.3s;
            white-space: nowrap;
        }

        .lang-btn:hover {
            border-color: var(--text-accent);
            box-shadow: 0 0 12px var(--glow);
        }

        .lang-btn .arrow {
            transition: transform 0.3s;
            font-size: 0.7rem;
        }

        .lang-btn.open .arrow {
            transform: rotate(180deg);
        }

        .lang-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--dropdown-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem 0;
            min-width: 220px;
            max-height: 420px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            box-shadow: 0 20px 40px var(--shadow-color);
            z-index: 1001;
        }

        .lang-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .lang-menu::-webkit-scrollbar {
            width: 6px;
        }

        .lang-menu::-webkit-scrollbar-track {
            background: transparent;
        }

        .lang-menu::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.55rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.88rem;
            color: var(--text-primary);
        }

        .lang-option:hover {
            background: var(--dropdown-hover);
        }

        .lang-option.active {
            color: var(--text-accent);
            font-weight: 600;
        }

        .lang-option .flag {
            font-size: 1.2rem;
            width: 1.5rem;
            text-align: center;
        }

        /* ============ MOBILE MENU ============ */
        .mobile-menu-btn {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1.3rem;
        }

        /* ============ OCEAN SCENE ============ */
        .ocean-scene {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding-top: 64px;
            overflow: hidden;
            background: linear-gradient(180deg, var(--ocean-top) 0%, var(--ocean-mid) 50%, var(--ocean-bottom) 100%);
            transition: background var(--transition-speed);
        }

        /* Stars (dark theme only) */
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--star-color);
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: var(--max-opacity); }
        }

        /* Clouds */
        .clouds-container {
            position: absolute;
            top: 5%;
            left: 0;
            width: 100%;
            height: 25%;
            pointer-events: none;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: var(--cloud-color);
            border-radius: 50%;
            filter: blur(20px);
            animation: drift-cloud linear infinite;
        }

        @keyframes drift-cloud {
            from { transform: translateX(-200px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* Waves */
        .waves-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .wave-layer {
            position: absolute;
            width: 200%;
            height: 100%;
            bottom: 0;
            left: 0;
            opacity: 0.6;
        }

        .wave-layer svg {
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        /* ============ HERO SECTION ============ */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 2rem 3rem;
            min-height: 50vh;
        }

        .hero-emoji {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            animation: hero-bounce 4s ease-in-out infinite;
            filter: drop-shadow(0 8px 24px var(--shadow-color));
        }

        @keyframes hero-bounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            25% { transform: translateY(-12px) rotate(1deg); }
            50% { transform: translateY(-4px) rotate(-1deg); }
            75% { transform: translateY(-16px) rotate(2deg); }
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, var(--text-primary), var(--text-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.6;
        }

        /* ============ ISLANDS GRID ============ */
        .islands-section {
            position: relative;
            z-index: 10;
            padding: 2rem 2rem 6rem;
        }

        .islands-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            color: var(--text-primary);
        }

        .islands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ============ ISLAND CARD ============ */
        .island-card {
            position: relative;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .island-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--card-accent, var(--text-accent)), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .island-card:hover::before {
            opacity: 1;
        }

        .island-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px var(--shadow-color);
            border-color: var(--text-accent);
        }

        .island-card-wave {
            position: absolute;
            bottom: -2px;
            left: -10%;
            width: 120%;
            height: 60px;
            pointer-events: none;
            opacity: 0.06;
        }

        .island-card-wave svg {
            width: 100%;
            height: 100%;
        }

        .card-icon {
            font-size: 2.4rem;
            margin-bottom: 0.25rem;
            display: inline-block;
            animation: card-float 5s ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }

        @keyframes card-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .card-desc {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        .card-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--border-color);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--text-accent);
            width: fit-content;
            margin-top: 0.25rem;
        }

        /* ============ FLOATING MINI ISLANDS ============ */
        .floating-islands {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .mini-island {
            position: absolute;
            font-size: var(--size, 1.5rem);
            opacity: var(--opacity, 0.25);
            animation: mini-float var(--speed, 20s) linear infinite;
            filter: blur(var(--blur, 0px));
        }

        @keyframes mini-float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(var(--dx1, 30px), var(--dy1, -20px)) rotate(5deg);
            }
            50% {
                transform: translate(var(--dx2, -20px), var(--dy2, 15px)) rotate(-3deg);
            }
            75% {
                transform: translate(var(--dx3, 15px), var(--dy3, -30px)) rotate(4deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        /* ============ FOOTER ============ */
        .footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            background: var(--bg-header);
            backdrop-filter: blur(20px);
        }

        .footer a {
            color: var(--text-accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ============ WATER RIPPLE CURSOR ============ */
        .ripple {
            position: fixed;
            border-radius: 50%;
            border: 1px solid var(--text-accent);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            animation: ripple-effect 0.8s ease-out forwards;
        }

        @keyframes ripple-effect {
            0% {
                width: 0;
                height: 0;
                opacity: 0.5;
            }
            100% {
                width: 80px;
                height: 80px;
                opacity: 0;
                margin-top: -40px;
                margin-left: -40px;
            }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .header {
                padding: 0 1rem;
            }

            .header-controls .lang-btn .lang-label {
                display: none;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-emoji {
                font-size: 3rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .islands-grid {
                grid-template-columns: 1fr;
            }

            .islands-section {
                padding: 2rem 1rem 4rem;
            }
        }

        @media (max-width: 480px) {
            .hero {
                padding: 4rem 1rem 2rem;
            }

            .hero-title {
                font-size: 1.6rem;
            }

            .island-card {
                padding: 1.5rem;
            }
        }

        /* ============ ANIMATIONS ON SCROLL ============ */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loading animation */
        .page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-island {
            font-size: 3rem;
            animation: loader-bounce 1s ease-in-out infinite;
        }

        @keyframes loader-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 2px;
        }

        .loader-bar {
            width: 120px;
            height: 3px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .loader-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--text-accent);
            border-radius: 3px;
            animation: loader-fill 1.5s ease forwards;
        }

        @keyframes loader-fill {
            to { width: 100%; }
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--foam-color);
            border-radius: 50%;
            pointer-events: none;
            animation: particle-rise var(--speed, 4s) ease-in infinite;
            opacity: 0;
        }

        @keyframes particle-rise {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            20% { opacity: 0.8; transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0.3); }
        }
    </style>
</head>

    <!-- Ocean Scene -->

        <!-- Hero -->
        <section class="hero">

   ================================================================ */
const ISLANDS = [
    { id: "carapuz201G", icon: "🤖", href: "/carapuz201G", accent: "#5865F2", delay: "0s" },
    { id: "weather", icon: "🌦️", href: "/weather", accent: "#38bdf8", delay: "0.3s" },
    { id: "bg-remove", icon: "🖼️", href: "/bg-remove", accent: "#a78bfa", delay: "0.6s" },
    { id: "speedtest", icon: "⚡", href: "/speedtest", accent: "#fbbf24", delay: "0.9s" },
    { id: "ocr", icon: "📝", href: "/ocr", accent: "#34d399", delay: "1.2s" },
    { id: "anti-virus", icon: "🛡️", href: "/anti-virus", accent: "#f87171", delay: "1.5s" }
];

/* ================================================================
   APP STATE
   ================================================================ */
let currentLang = localStorage.getItem('cl-lang') || 'en-gb';
let currentTheme = localStorage.getItem('cl-theme') || 'dark';

/* ================================================================
   INITIALIZATION
   ================================================================ */
document.addEventListener('DOMContentLoaded', () => {
    applyTheme(currentTheme);
    buildLanguageMenu();
    buildIslandCards();
    generateStars();
    generateClouds();
    generateFloatingIslands();
    generateParticles();
    applyLanguage(currentLang);
    setupEventListeners();
    setupScrollReveal();

    // Hide loader
    setTimeout(() => {
        document.getElementById('pageLoader').classList.add('hidden');
    }, 1600);
});

/* ================================================================
   THEME
   ================================================================ */
function applyTheme(theme) {
    currentTheme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('cl-theme', theme);
    const btn = document.getElementById('themeToggle');
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
    applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

/* ================================================================
   LANGUAGE
   ================================================================ */
function buildLanguageMenu() {
    const menu = document.getElementById('langMenu');
    menu.innerHTML = '';
    const keys = Object.keys(TRANSLATIONS);
    keys.sort((a, b) => TRANSLATIONS[a].name.localeCompare(TRANSLATIONS[b].name));

    keys.forEach(code => {
        const lang = TRANSLATIONS[code];
        const opt = document.createElement('div');
        opt.className = 'lang-option' + (code === currentLang ? ' active' : '');
        opt.innerHTML = `<span class="flag">${lang.flag}</span><span>${lang.name}</span>`;
        opt.addEventListener('click', () => {
            applyLanguage(code);
            closeLangMenu();
        });
        menu.appendChild(opt);
    });
}

function applyLanguage(code) {
    if (!TRANSLATIONS[code]) code = 'en-gb';
    currentLang = code;
    localStorage.setItem('cl-lang', code);
    const t = TRANSLATIONS[code];

    // Update header
    document.getElementById('currentFlag').textContent = t.flag;
    document.getElementById('currentLang').textContent = t.name;

    // Update static i18n elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
    });

    // Update cards
    document.querySelectorAll('.island-card').forEach(card => {
        const id = card.getAttribute('data-island');
        if (t.cards && t.cards[id]) {
            card.querySelector('.card-title').textContent = t.cards[id].title;
            card.querySelector('.card-desc').textContent = t.cards[id].desc;
            card.querySelector('.card-tag').textContent = t.cards[id].tag;
        }
    });

    // Update active state in menu
    document.querySelectorAll('.lang-option').forEach(opt => {
        opt.classList.remove('active');
    });
    const keys = Object.keys(TRANSLATIONS);
    keys.sort((a, b) => TRANSLATIONS[a].name.localeCompare(TRANSLATIONS[b].name));
    const idx = keys.indexOf(code);
    const options = document.querySelectorAll('.lang-option');
    if (options[idx]) options[idx].classList.add('active');

    // Set html lang attribute
    document.documentElement.lang = code;
}

function toggleLangMenu() {
    const menu = document.getElementById('langMenu');
    const btn = document.getElementById('langBtn');
    const isOpen = menu.classList.contains('show');
    if (isOpen) {
        closeLangMenu();
    } else {
        menu.classList.add('show');
        btn.classList.add('open');
    }
}

function closeLangMenu() {
    document.getElementById('langMenu').classList.remove('show');
    document.getElementById('langBtn').classList.remove('open');
}

/* ================================================================
   ISLAND CARDS
   ================================================================ */
function buildIslandCards() {
    const grid = document.getElementById('islandsGrid');
    grid.innerHTML = '';
    ISLANDS.forEach((island, i) => {
        const card = document.createElement('a');
        card.className = 'island-card reveal';
        card.setAttribute('data-island', island.id);
        card.href = island.href;
        card.style.setProperty('--card-accent', island.accent);
        card.style.transitionDelay = `${i * 0.1}s`;

        card.innerHTML = `
            <span class="card-icon" style="--delay:${island.delay}">${island.icon}</span>
            <div class="card-title">${island.id}</div>
            <div class="card-desc">...</div>
            <span class="card-tag">...</span>
            <div class="island-card-wave">
                <svg viewBox="0 0 500 50" preserveAspectRatio="none">
                    <path d="M0,25 C125,45 375,5 500,25 L500,50 L0,50 Z" fill="${island.accent}" opacity="0.15"/>
                </svg>
            </div>
        `;
        grid.appendChild(card);
    });
}

/* ================================================================
   VISUAL EFFECTS
   ================================================================ */
function generateStars() {
    const container = document.getElementById('starsContainer');
    for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
        star.style.setProperty('--max-opacity', (0.3 + Math.random() * 0.7));
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.width = (1 + Math.random() * 2) + 'px';
        star.style.height = star.style.width;
        container.appendChild(star);
    }
}

function generateClouds() {
    const container = document.getElementById('cloudsContainer');
    for (let i = 0; i < 6; i++) {
        const cloud = document.createElement('div');
        cloud.className = 'cloud';
        const size = 80 + Math.random() * 200;
        cloud.style.width = size + 'px';
        cloud.style.height = (size * 0.4) + 'px';
        cloud.style.top = (Math.random() * 80) + '%';
        cloud.style.left = '-200px';
        cloud.style.animationDuration = (30 + Math.random() * 40) + 's';
        cloud.style.animationDelay = (Math.random() * 30) + 's';
        cloud.style.opacity = 0.3 + Math.random() * 0.5;
        container.appendChild(cloud);
    }
}

function generateFloatingIslands() {
    const container = document.getElementById('floatingIslands');
    const emojis = ['🏝️', '🏝️', '🌊', '🏝️', '⛵', '🏝️', '🐚', '🏝️', '🌴', '🏝️', '🐠', '🏝️'];
    for (let i = 0; i < 18; i++) {
        const island = document.createElement('div');
        island.className = 'mini-island';
        island.textContent = emojis[i % emojis.length];
        island.style.left = (Math.random() * 95) + '%';
        island.style.top = (15 + Math.random() * 75) + '%';
        island.style.setProperty('--size', (0.8 + Math.random() * 1.5) + 'rem');
        island.style.setProperty('--opacity', (0.08 + Math.random() * 0.2));
        island.style.setProperty('--speed', (15 + Math.random() * 30) + 's');
        island.style.setProperty('--blur', Math.random() > 0.5 ? '1px' : '0px');
        island.style.setProperty('--dx1', (Math.random() * 60 - 30) + 'px');
        island.style.setProperty('--dy1', (Math.random() * 40 - 20) + 'px');
        island.style.setProperty('--dx2', (Math.random() * 60 - 30) + 'px');
        island.style.setProperty('--dy2', (Math.random() * 40 - 20) + 'px');
        island.style.setProperty('--dx3', (Math.random() * 60 - 30) + 'px');
        island.style.setProperty('--dy3', (Math.random() * 40 - 20) + 'px');
        island.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(island);
    }
}

function generateParticles() {
    const container = document.getElementById('particlesContainer');
    for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = (Math.random() * 100) + '%';
        particle.style.bottom = (Math.random() * 30) + '%';
        particle.style.setProperty('--speed', (3 + Math.random() * 5) + 's');
        particle.style.animationDelay = (Math.random() * 6) + 's';
        particle.style.width = (2 + Math.random() * 4) + 'px';
        particle.style.height = particle.style.width;
        container.appendChild(particle);
    }
}

/* ================================================================
   SCROLL REVEAL
   ================================================================ */
function setupScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

/* ================================================================
   EVENT LISTENERS
   ================================================================ */
function setupEventListeners() {
    // Theme toggle
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // Language dropdown
    document.getElementById('langBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleLangMenu();
    });

    // Close dropdown on outside click
    document.addEventListener('click', (e) => {
        if (!document.getElementById('langDropdown').contains(e.target)) {
            closeLangMenu();
        }
    });

    // Ripple effect on click
    document.addEventListener('click', (e) => {
        if (e.target.closest('.header') || e.target.closest('.lang-menu')) return;
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = e.clientX + 'px';
        ripple.style.top = e.clientY + 'px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
    });

    // Keyboard: Escape closes dropdown
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLangMenu();
    });
}
