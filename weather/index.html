<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Weather Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f0f4f8; --card: #ffffff; --pri: #2563eb; --pri-hov: #1d4ed8;
    --tx: #1e293b; --tx2: #475569; --tx3: #94a3b8; --bor: #e2e8f0; --hov: #f8fafc;
    --shadow: 0 8px 30px rgba(0,0,0,0.08); --r: 16px;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --card: #1e293b; --pri: #3b82f6; --pri-hov: #60a5fa;
    --tx: #f8fafc; --tx2: #cbd5e1; --tx3: #64748b; --bor: #334155; --hov: #0f172a;
    --shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--tx); transition: background 0.3s, color 0.3s; min-height: 100vh; }

  /* Header */
  .hdr { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 2rem 1rem; text-align: center; position: relative; }
  .hdr h1 { font-size: 2.2rem; margin-bottom: 0.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
  .hdr p { opacity: 0.9; font-size: 1rem; }
  .controls { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.5rem; }
  .controls select, .controls button { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 0.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; backdrop-filter: blur(5px); outline: none; }
  .controls select option { background: #1e293b; color: white; }
  .controls button:hover { background: rgba(255,255,255,0.3); }

  /* Main Wrapper */
  .wrap { max-width: 1000px; margin: 0 auto; padding: 0 1rem 2rem; }

  /* City Selector */
  .city-bar { background: var(--card); border-radius: var(--r); padding: 1rem 1.5rem; margin-top: -1.5rem; position: relative; z-index: 10; box-shadow: var(--shadow); display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  .city-bar select, .search-wrap input { padding: 0.7rem; border: 2px solid var(--bor); border-radius: 10px; background: var(--hov); color: var(--tx); font-size: 0.95rem; outline: none; width: 100%; transition: border 0.2s; }
  .city-bar select:focus, .search-wrap input:focus { border-color: var(--pri); }
  .search-wrap { flex: 1; min-width: 250px; position: relative; }
  .dd { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: var(--card); border: 2px solid var(--bor); border-radius: 10px; max-height: 350px; overflow-y: auto; display: none; z-index: 100; box-shadow: var(--shadow); }
  .dd.open { display: block; }
  .dd-item { padding: 0.8rem 1rem; cursor: pointer; border-bottom: 1px solid var(--bor); display: flex; justify-content: space-between; align-items: center; }
  .dd-item:hover { background: var(--pri); color: white; }
  .dd-item span { font-size: 0.8rem; opacity: 0.7; }
  .dd-item:hover span { color: white; opacity: 0.9; }

  /* Tabs */
  .tabs { display: flex; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .tab-btn { padding: 0.8rem 1.5rem; background: var(--bor); border: none; border-radius: 12px 12px 0 0; color: var(--tx2); font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
  .tab-btn.active { background: var(--card); color: var(--pri); box-shadow: 0 -4px 10px rgba(0,0,0,0.03); }

  /* Panels */
  .panel { background: var(--card); border-radius: 0 var(--r) var(--r) var(--r); padding: 1.5rem; box-shadow: var(--shadow); display: none; min-height: 300px; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Weather UI */
  .current-main { text-align: center; padding: 1rem 0; }
  .w-icon { font-size: 5rem; line-height: 1; margin-bottom: 0.5rem; }
  .w-temp { font-size: 4rem; font-weight: 800; letter-spacing: -2px; }
  .w-desc { font-size: 1.2rem; color: var(--tx2); margin-top: 0.5rem; }
  .w-city { font-size: 1rem; color: var(--tx3); margin-top: 0.2rem; }

  .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.8rem; margin: 1.5rem 0; }
  .stat-card { background: var(--hov); padding: 1rem; border-radius: 12px; text-align: center; border: 1px solid var(--bor); }
  .stat-card .icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
  .stat-card .lbl { font-size: 0.8rem; color: var(--tx3); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .val { font-size: 1.1rem; font-weight: bold; margin-top: 0.2rem; }

  /* Hourly Scroll */
  .hourly-wrap { display: flex; gap: 0.5rem; overflow-x: auto; padding: 1rem 0; scrollbar-width: thin; }
  .hour-card { background: var(--card); border: 1px solid var(--bor); padding: 0.8rem; border-radius: 12px; min-width: 70px; text-align: center; flex-shrink: 0; }
  .hour-card .time { font-size: 0.8rem; color: var(--tx3); }
  .hour-card .ic { font-size: 1.5rem; margin: 0.4rem 0; }
  .hour-card .t { font-weight: bold; font-size: 1rem; }

  /* Charts */
  .chart-container { background: var(--hov); border-radius: 16px; padding: 1rem; margin-top: 1.5rem; border: 1px solid var(--bor); }
  .chart-container h3 { font-size: 1rem; color: var(--tx2); margin-bottom: 1rem; }
  .chart-wrapper { position: relative; height: 250px; width: 100%; }

  /* 14 Days Grid */
  .forecast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; margin-bottom: 1.5rem; }
  .day-card { background: var(--hov); border: 2px solid transparent; border-radius: 12px; padding: 0.8rem 0.5rem; text-align: center; cursor: pointer; transition: 0.2s; }
  .day-card:hover { transform: translateY(-3px); border-color: var(--bor); }
  .day-card.selected { border-color: var(--pri); background: rgba(37, 99, 235, 0.05); }
  .day-card .dt { font-size: 0.8rem; color: var(--tx2); font-weight: bold; }
  .day-card .ic { font-size: 2rem; margin: 0.3rem 0; }
  .day-card .hi { font-weight: bold; font-size: 1.1rem; }
  .day-card .lo { color: var(--tx3); font-size: 0.9rem; }

  /* Forms & Buttons */
  .form-group { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: flex-end; flex-wrap: wrap; }
  .input-block { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 150px; }
  .input-block label { font-size: 0.85rem; font-weight: bold; color: var(--tx2); }
  .input-block input { padding: 0.8rem; border-radius: 10px; border: 2px solid var(--bor); background: var(--card); color: var(--tx); font-family: inherit; }
  .btn { padding: 0.8rem 1.5rem; background: var(--pri); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
  .btn:hover { background: var(--pri-hov); transform: translateY(-2px); }

  /* Loader & Error */
  .loader { text-align: center; padding: 3rem; color: var(--tx3); font-size: 1.2rem; }
  .err-msg { background: #fee2e2; color: #b91c1c; padding: 1rem; border-radius: 10px; border: 1px solid #fca5a5; }
  [data-theme="dark"] .err-msg { background: #450a0a; color: #fca5a5; border-color: #991b1b; }

  @media (max-width: 600px) {
    .hdr h1 { font-size: 1.6rem; }
    .w-temp { font-size: 3rem; }
    .controls { top: 0.5rem; right: 0.5rem; }
    .tab-btn { padding: 0.6rem 0.8rem; font-size: 0.85rem; }
    .panel { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="controls">
    <select id="langSel" onchange="changeLang(this.value)">
      <option value="en">🇬🇧 EN</option><option value="uk">🇺🇦 UK</option>
      <option value="ru">🇷🇺 RU</option><option value="de">🇩🇪 DE</option>
      <option value="fr">🇫🇷 FR</option><option value="es">🇪🇸 ES</option>
      <option value="it">🇮🇹 IT</option><option value="pl">🇵🇱 PL</option>
    </select>
    <button onclick="toggleTheme()" title="Toggle Theme">🌓</button>
  </div>
  <h1 id="t_mainTitle">🌤️ World Weather Pro</h1>
  <p id="t_subTitle">Accurate 24h Charts · 14-Day Forecast · AI Prediction</p>
</div>

<div class="wrap">
  <!-- City Selection -->
  <div class="city-bar">
    <div style="display: flex; flex-direction: column; width: 100%; max-width: 250px; gap: 0.3rem;">
      <label id="t_countryLbl">🌍 Country</label>
      <select id="countrySel"></select>
    </div>
    <div class="search-wrap" style="display: flex; flex-direction: column; width: 100%; gap: 0.3rem;">
      <label id="t_cityLbl">📍 City</label>
      <input type="text" id="citySearch" autocomplete="off">
      <div class="dd" id="cityDropdown"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="current" id="t_tabCur">🌡️ Now</button>
    <button class="tab-btn" data-tab="forecast" id="t_tabFc">📅 14 Days</button>
    <button class="tab-btn" data-tab="history" id="t_tabHist">📜 History</button>
    <button class="tab-btn" data-tab="predict" id="t_tabPred">🔮 AI Predict</button>
  </div>

  <!-- Panel: Current -->
  <div class="panel active" id="panel-current"></div>

  <!-- Panel: Forecast -->
  <div class="panel" id="panel-forecast"></div>

  <!-- Panel: History -->
  <div class="panel" id="panel-history">
    <div class="form-group">
      <div class="input-block"><label id="t_dateFrom">From:</label><input type="date" id="histStart"></div>
      <div class="input-block"><label id="t_dateTo">To:</label><input type="date" id="histEnd"></div>
      <button class="btn" onclick="loadHistory()" id="t_btnHist">Show Data</button>
    </div>
    <div id="histContent"></div>
  </div>

  <!-- Panel: Predict -->
  <div class="panel" id="panel-predict">
    <p style="color:var(--tx3); margin-bottom: 1rem; line-height: 1.5;" id="t_predDesc">
      Select any future date. The algorithm will analyze 8 years of weather data for this exact day, applying Gaussian weighting and linear regression to predict the weather based on climate trends.
    </p>
    <div class="form-group">
      <div class="input-block"><label id="t_targetDate">Target Date:</label><input type="date" id="predDate"></div>
      <button class="btn" onclick="loadPrediction()" id="t_btnPred">Run AI Prediction</button>
    </div>
    <div id="predContent"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   1. TRANSLATIONS (100% COMPLETE)
   ════════════════════════════════════════════════════════════ */
const TRANSLATIONS = {
  en: {
    mainTitle:'🌤️ World Weather Pro', subTitle:'Accurate 24h Charts · 14-Day Forecast · AI Prediction',
    countryLbl:'🌍 Country', cityLbl:'📍 City Search', searchPlh:'Type city name...',
    tabCur:'🌡️ Now', tabFc:'📅 14 Days', tabHist:'📜 History', tabPred:'🔮 AI Predict',
    dateFrom:'From Date:', dateTo:'To Date:', btnHist:'Show History',
    targetDate:'Target Date:', btnPred:'Run Prediction',
    predDesc:'Select any future date. The algorithm analyzes 8 years of data using Gaussian weighting to predict weather based on real climate trends.',
    loading:'Loading data...', errFetch:'Network error. Please try again.', errDates:'Select both dates.', errRange:'Start date must be before end date.',
    feels:'Feels like', hum:'Humidity', wind:'Wind', press:'Pressure', precip:'Precipitation', uv:'UV Index',
    chart24:'📈 24-Hour Temperature & Precipitation',
    chartFcTemp:'📈 14-Day Temperature', chartFcPrec:'🌧️ 14-Day Precipitation',
    clickDay:'👆 Click any day below to see its 24-hour details',
    avgMax:'Avg Max', avgMin:'Avg Min', totalPrec:'Total Precip', days:'Days analyzed',
    predConf:'Confidence:', predTrend:'Warming Trend:', predSpread:'Data Spread (σ):',
    wmo: {0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast', 45:'Fog', 51:'Drizzle', 61:'Rain', 71:'Snow', 95:'Thunderstorm'}
  },
  uk: {
    mainTitle:'🌤️ Світова Погода Pro', subTitle:'Точні графіки на 24 год · Прогноз на 14 днів · AI Аналіз',
    countryLbl:'🌍 Країна', cityLbl:'📍 Пошук міста', searchPlh:'Введіть назву міста...',
    tabCur:'🌡️ Зараз', tabFc:'📅 14 Днів', tabHist:'📜 Історія', tabPred:'🔮 AI Прогноз',
    dateFrom:'З дати:', dateTo:'По дату:', btnHist:'Показати історію',
    targetDate:'Цільова дата:', btnPred:'Зробити прогноз',
    predDesc:'Оберіть майбутню дату. Алгоритм проаналізує дані за 8 років, використовуючи Гаусове зважування для розрахунку кліматичних трендів.',
    loading:'Завантаження...', errFetch:'Помилка мережі. Спробуйте ще раз.', errDates:'Оберіть обидві дати.', errRange:'Дата початку має бути раніше.',
    feels:'Відчувається', hum:'Вологість', wind:'Вітер', press:'Тиск', precip:'Опади', uv:'UV Індекс',
    chart24:'📈 Температура та Опади на 24 години',
    chartFcTemp:'📈 Температура на 14 днів', chartFcPrec:'🌧️ Опади на 14 днів',
    clickDay:'👆 Натисніть на будь-який день для детального графіка',
    avgMax:'Сер. Макс', avgMin:'Сер. Мін', totalPrec:'Сума опадів', days:'Днів проаналізовано',
    predConf:'Впевненість:', predTrend:'Тренд потепління:', predSpread:'Розкид даних (σ):',
    wmo: {0:'Ясно', 1:'Переважно ясно', 2:'Мінлива хмарність', 3:'Похмуро', 45:'Туман', 51:'Мряка', 61:'Дощ', 71:'Сніг', 95:'Гроза'}
  },
  ru: {
    mainTitle:'🌤️ Погода Pro', subTitle:'Графики на 24 часа · Прогноз на 14 дней · AI Анализ',
    countryLbl:'🌍 Страна', cityLbl:'📍 Поиск города', searchPlh:'Введите город...',
    tabCur:'🌡️ Сейчас', tabFc:'📅 14 Дней', tabHist:'📜 История', tabPred:'🔮 AI Прогноз',
    dateFrom:'С даты:', dateTo:'По дату:', btnHist:'Показать историю',
    targetDate:'Целевая дата:', btnPred:'Создать прогноз',
    predDesc:'Выберите дату в будущем. Алгоритм проанализирует данные за 8 лет для вычисления реальных климатических трендов.',
    loading:'Загрузка...', errFetch:'Ошибка сети.', errDates:'Выберите обе даты.', errRange:'Начало должно быть раньше конца.',
    feels:'Ощущается', hum:'Влажность', wind:'Ветер', press:'Давление', precip:'Осадки', uv:'УФ Индекс',
    chart24:'📈 Температура и Осадки на 24 часа',
    chartFcTemp:'📈 Температура на 14 дней', chartFcPrec:'🌧️ Осадки на 14 дней',
    clickDay:'👆 Нажмите на день для детального графика',
    avgMax:'Ср. Макс', avgMin:'Ср. Мин', totalPrec:'Сумма осадков', days:'Дней проанализировано',
    predConf:'Уверенность:', predTrend:'Тренд потепления:', predSpread:'Разброс данных (σ):',
    wmo: {0:'Ясно', 1:'В основном ясно', 2:'Переменная облачность', 3:'Пасмурно', 45:'Туман', 51:'Морось', 61:'Дождь', 71:'Снег', 95:'Гроза'}
  }
};

// Fallback logic
let currentLang = localStorage.getItem('weatherLang') || 'en';
function t(key) {
  if (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) return TRANSLATIONS[currentLang][key];
  return TRANSLATIONS['en'][key] || key;
}

const WMO_ICONS = {0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 51:'🌦️', 61:'🌧️', 71:'🌨️', 95:'⛈️'};
function getWmoIcon(code) {
  if(code>=0 && code<=3) return WMO_ICONS[code];
  if(code===45 || code===48) return WMO_ICONS[45];
  if(code>=51 && code<=57) return WMO_ICONS[51];
  if(code>=61 && code<=67) return WMO_ICONS[61];
  if(code>=71 && code<=77) return WMO_ICONS[71];
  if(code>=80 && code<=82) return WMO_ICONS[61];
  if(code>=85 && code<=86) return WMO_ICONS[71];
  if(code>=95) return WMO_ICONS[95];
  return '❓';
}
function getWmoDesc(code) {
  let baseCode = 0;
  if(code>=0 && code<=3) baseCode = code;
  else if(code===45 || code===48) baseCode = 45;
  else if(code>=51 && code<=57) baseCode = 51;
  else if(code>=61 && code<=67 || code>=80 && code<=82) baseCode = 61;
  else if(code>=71 && code<=77 || code>=85 && code<=86) baseCode = 71;
  else if(code>=95) baseCode = 95;

  const dict = TRANSLATIONS[currentLang]?.wmo || TRANSLATIONS['en'].wmo;
  return dict[baseCode] || dict[0];
}

/* ════════════════════════════════════════════════════════════
   2. CITY DATA (Optimized structure)
   ════════════════════════════════════════════════════════════ */
const RAW_REGIONS = [
  ["UA", "🇺🇦", "Ukraine", "Україна", "Украина", {
    "Kyiv": "Kyiv,50.45,30.52;Bila Tserkva,49.80,30.11;Brovary,50.51,30.79",
    "Kharkiv": "Kharkiv,49.99,36.23;Izyum,49.21,37.26",
    "Odesa": "Odesa,46.48,30.72;Izmail,45.35,28.84",
    "Lviv": "Lviv,49.84,24.03;Drohobych,49.35,23.51",
    "Dnipro": "Dnipro,48.46,35.05;Kryvyi Rih,47.91,33.39"
  }],
  ["PL", "🇵🇱", "Poland", "Польща", "Польша", {
    "Mazowieckie": "Warsaw,52.23,21.01;Radom,51.40,21.14",
    "Lesser Poland": "Kraków,50.06,19.94;Tarnów,50.01,20.98",
    "Lower Silesia": "Wrocław,51.11,17.04"
  }],
  ["DE", "🇩🇪", "Germany", "Німеччина", "Германия", {
    "Berlin": "Berlin,52.52,13.41",
    "Bavaria": "Munich,48.14,11.58;Nuremberg,49.45,11.08",
    "Hesse": "Frankfurt,50.11,8.68"
  }],
  ["US", "🇺🇸", "USA", "США", "США", {
    "East": "New York,40.71,-74.01;Miami,25.76,-80.19",
    "West": "Los Angeles,34.05,-118.24;Seattle,47.61,-122.33",
    "Midwest": "Chicago,41.88,-87.63"
  }]
];

const COUNTRIES = [];
const CITIES = [];

RAW_REGIONS.forEach((c, idx) => {
  COUNTRIES.push({ id: idx, code: c[0], flag: c[1], en: c[2], uk: c[3], ru: c[4] });
  Object.entries(c[5]).forEach(([region, citiesStr]) => {
    citiesStr.split(';').forEach(cityStr => {
      const parts = cityStr.split(',');
      CITIES.push({ name: parts[0], lat: parseFloat(parts[1]), lon: parseFloat(parts[2]), region: region, countryId: idx });
    });
  });
});

let currentCity = CITIES[0];
let currentCountryId = 0;
let activeTab = 'current';
let globalChartInstances = {};

/* ════════════════════════════════════════════════════════════
   3. CORE LOGIC & UI
   ════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

function initApp() {
  // Theme
  if(localStorage.getItem('weatherTheme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

  // Language
  if(localStorage.getItem('weatherLang')) {
    currentLang = localStorage.getItem('weatherLang');
    $('langSel').value = currentLang;
  }

  // Load Saved City
  const savedCityName = localStorage.getItem('weatherSavedCity');
  if(savedCityName) {
    const found = CITIES.find(c => c.name === savedCityName);
    if(found) {
      currentCity = found;
      currentCountryId = found.countryId;
    }
  }

  applyTranslations();
  buildCountrySelector();
  setupSearch();
  setupTabs();
  setupDatePickers();

  $('citySearch').value = currentCity.name;
  loadActiveTab();
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('weatherTheme', isDark ? 'light' : 'dark');
  loadActiveTab(); // Redraw charts with correct colors
}

function changeLang(l) {
  currentLang = l;
  localStorage.setItem('weatherLang', l);
  applyTranslations();
  buildCountrySelector(); // Rebuild to change country names
  loadActiveTab(); // Reload data to translate weather descriptions
}

function applyTranslations() {
  $('t_mainTitle').textContent = t('mainTitle');
  $('t_subTitle').textContent = t('subTitle');
  $('t_countryLbl').textContent = t('countryLbl');
  $('t_cityLbl').textContent = t('cityLbl');
  $('citySearch').placeholder = t('searchPlh');
  $('t_tabCur').textContent = t('tabCur');
  $('t_tabFc').textContent = t('tabFc');
  $('t_tabHist').textContent = t('tabHist');
  $('t_tabPred').textContent = t('tabPred');
  $('t_dateFrom').textContent = t('dateFrom');
  $('t_dateTo').textContent = t('dateTo');
  $('t_btnHist').textContent = t('btnHist');
  $('t_predDesc').textContent = t('predDesc');
  $('t_targetDate').textContent = t('targetDate');
  $('t_btnPred').textContent = t('btnPred');
}

function buildCountrySelector() {
  const sel = $('countrySel');
  sel.innerHTML = '';
  COUNTRIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    // Pick name based on language
    const name = currentLang === 'uk' ? c.uk : currentLang === 'ru' ? c.ru : c.en;
    opt.textContent = `${c.flag} ${name}`;
    sel.appendChild(opt);
  });
  sel.value = currentCountryId;

  sel.onchange = (e) => {
    currentCountryId = parseInt(e.target.value);
    $('citySearch').value = '';
    renderDropdown('');
  };
}

function setupSearch() {
  const input = $('citySearch');
  const dd = $('cityDropdown');

  input.onfocus = () => { input.value = ''; renderDropdown(''); dd.classList.add('open'); };
  input.oninput = () => { renderDropdown(input.value); dd.classList.add('open'); };

  // Use mousedown to trigger before input blur
  dd.onmousedown = (e) => {
    const item = e.target.closest('.dd-item');
    if(item) {
      e.preventDefault();
      currentCity = CITIES[item.dataset.idx];
      localStorage.setItem('weatherSavedCity', currentCity.name);
      input.value = currentCity.name;
      dd.classList.remove('open');
      loadActiveTab();
    }
  };

  document.onclick = (e) => { if(!e.target.closest('.search-wrap')) dd.classList.remove('open'); };
}

function renderDropdown(filter) {
  const dd = $('cityDropdown');
  const fl = filter.toLowerCase().trim();
  let html = '';

  CITIES.forEach((c, idx) => {
    if(c.countryId === currentCountryId) {
      if(!fl || c.name.toLowerCase().includes(fl)) {
        html += `<div class="dd-item" data-idx="${idx}">
                   <strong>${c.name}</strong> <span>${c.region}</span>
                 </div>`;
      }
    }
  });

  dd.innerHTML = html || `<div style="padding:1rem;text-align:center;">😕</div>`;
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      $(`panel-${activeTab}`).classList.add('active');
      loadActiveTab();
    };
  });
}

function setupDatePickers() {
  const today = new Date();
  const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);
  const monthAgo = new Date(today); monthAgo.setDate(monthAgo.getDate() - 37);

  $('histStart').value = monthAgo.toISOString().slice(0,10);
  $('histEnd').value = weekAgo.toISOString().slice(0,10);

  const monthAhead = new Date(today); monthAhead.setDate(monthAhead.getDate() + 30);
  $('predDate').value = monthAhead.toISOString().slice(0,10);
}

/* ════════════════════════════════════════════════════════════
   4. CHART.JS HIGH CONTRAST CONFIGURATION
   ════════════════════════════════════════════════════════════ */
function getChartConfig(type, labels, datasets, y2Axis = false) {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const textColor = isDark ? '#ffffff' : '#000000'; // Pure white or pure black for MAX visibility
  const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

  const scales = {
    x: { ticks: { color: textColor, font: {weight: 'bold'} }, grid: { color: gridColor } },
    y: { ticks: { color: textColor, font: {weight: 'bold'} }, grid: { color: gridColor } }
  };

  if(y2Axis) {
    scales.y1 = { position: 'right', ticks: { color: textColor, font: {weight: 'bold'} }, grid: { drawOnChartArea: false } };
  }

  return {
    type: type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: { legend: { labels: { color: textColor, font: {weight: 'bold'} } } },
      scales: scales
    }
  };
}

function createChart(canvasId, config) {
  if(globalChartInstances[canvasId]) globalChartInstances[canvasId].destroy();
  const ctx = $(canvasId);
  if(ctx) globalChartInstances[canvasId] = new Chart(ctx, config);
}

/* ════════════════════════════════════════════════════════════
   5. DATA FETCHING & RENDERING
   ════════════════════════════════════════════════════════════ */
function loadActiveTab() {
  if(activeTab === 'current') loadCurrent();
  else if(activeTab === 'forecast') loadForecast();
}

async function fetchAPI(url) {
  const r = await fetch(url);
  if(!r.ok) throw new Error('API Error');
  return r.json();
}

// ---- TAB 1: CURRENT ----
async function loadCurrent() {
  const el = $('panel-current');
  el.innerHTML = `<div class="loader">${t('loading')}</div>`;
  try {
    const data = await fetchAPI(`https://api.open-meteo.com/v1/forecast?latitude=${currentCity.lat}&longitude=${currentCity.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,pressure_msl,uv_index&hourly=temperature_2m,precipitation,weather_code&timezone=auto`);

    const cur = data.current;
    const hr = data.hourly;

    // Exactly 24 hours of data
    const labels24 = []; const temp24 = []; const prec24 = [];
    const currentHour = new Date().getHours();

    let scrollHtml = `<div class="hourly-wrap">`;

    for(let i=0; i<24; i++) {
      const timeStr = hr.time[i].slice(11,16);
      labels24.push(timeStr);
      temp24.push(hr.temperature_2m[i]);
      prec24.push(hr.precipitation[i]);

      // Build scroll items starting from CURRENT hour to +24h
      const idx = currentHour + i;
      if(idx < hr.time.length) {
        scrollHtml += `
          <div class="hour-card">
            <div class="time">${hr.time[idx].slice(11,16)}</div>
            <div class="ic">${getWmoIcon(hr.weather_code[idx])}</div>
            <div class="t">${Math.round(hr.temperature_2m[idx])}°</div>
            <div style="font-size:0.7rem; color:#3b82f6">${hr.precipitation[idx]>0 ? hr.precipitation[idx]+'mm' : ''}</div>
          </div>
        `;
      }
    }
    scrollHtml += `</div>`;

    el.innerHTML = `
      <div class="current-main">
        <div class="w-icon">${getWmoIcon(cur.weather_code)}</div>
        <div class="w-temp">${Math.round(cur.temperature_2m)}°C</div>
        <div class="w-desc">${getWmoDesc(cur.weather_code)}</div>
        <div class="w-city">📍 ${currentCity.name}, ${currentCity.region}</div>
      </div>

      <div class="grid-stats">
        <div class="stat-card"><div class="icon">🌡️</div><div class="lbl">${t('feels')}</div><div class="val">${Math.round(cur.apparent_temperature)}°C</div></div>
        <div class="stat-card"><div class="icon">💧</div><div class="lbl">${t('hum')}</div><div class="val">${cur.relative_humidity_2m}%</div></div>
        <div class="stat-card"><div class="icon">💨</div><div class="lbl">${t('wind')}</div><div class="val">${cur.wind_speed_10m} km/h</div></div>
        <div class="stat-card"><div class="icon">📊</div><div class="lbl">${t('press')}</div><div class="val">${Math.round(cur.pressure_msl)} hPa</div></div>
        <div class="stat-card"><div class="icon">🌧️</div><div class="lbl">${t('precip')}</div><div class="val">${cur.precipitation} mm</div></div>
        <div class="stat-card"><div class="icon">☀️</div><div class="lbl">${t('uv')}</div><div class="val">${cur.uv_index||0}</div></div>
      </div>

      ${scrollHtml}

      <div class="chart-container">
        <h3>${t('chart24')}</h3>
        <div class="chart-wrapper"><canvas id="curChart"></canvas></div>
      </div>
    `;

    const chartCfg = getChartConfig('line', labels24, [
      { label: '°C', data: temp24, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.2)', fill: true, tension: 0.3 },
      { label: 'mm', data: prec24, type: 'bar', backgroundColor: '#3b82f6', yAxisID: 'y1' }
    ], true);
    createChart('curChart', chartCfg);

  } catch(err) {
    el.innerHTML = `<div class="err-msg">${t('errFetch')}</div>`;
  }
}

// ---- TAB 2: FORECAST ----
let _fcData = null; // Cache for sub-day clicking
async function loadForecast() {
  const el = $('panel-forecast');
  el.innerHTML = `<div class="loader">${t('loading')}</div>`;
  try {
    _fcData = await fetchAPI(`https://api.open-meteo.com/v1/forecast?latitude=${currentCity.lat}&longitude=${currentCity.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&hourly=temperature_2m,precipitation,weather_code&timezone=auto&forecast_days=14`);
    renderForecastGrid(el);
  } catch(err) {
    el.innerHTML = `<div class="err-msg">${t('errFetch')}</div>`;
  }
}

function renderForecastGrid(el) {
  const d = _fcData.daily;
  let html = `<p style="text-align:center; color:var(--tx3); margin-bottom:1rem;">${t('clickDay')}</p><div class="forecast-grid">`;

  const datesShort = [];

  for(let i=0; i<d.time.length; i++) {
    const dt = new Date(d.time[i]);
    const str = `${dt.getDate()}/${dt.getMonth()+1}`;
    datesShort.push(str);

    html += `
      <div class="day-card ${i===0?'selected':''}" onclick="selectForecastDay(${i}, this)">
        <div class="dt">${str}</div>
        <div class="ic">${getWmoIcon(d.weather_code[i])}</div>
        <div class="hi">${Math.round(d.temperature_2m_max[i])}°</div>
        <div class="lo">${Math.round(d.temperature_2m_min[i])}°</div>
        <div style="font-size:0.7rem; color:#3b82f6; margin-top:5px;">${d.precipitation_sum[i]>0 ? d.precipitation_sum[i]+'mm' : ''}</div>
      </div>
    `;
  }
  html += `</div>
    <div class="chart-container"><h3>${t('chartFcTemp')}</h3><div class="chart-wrapper"><canvas id="fcTempCh"></canvas></div></div>
    <div class="chart-container"><h3>${t('chartFcPrec')}</h3><div class="chart-wrapper"><canvas id="fcPrecCh"></canvas></div></div>
    <div id="fcDayDetail"></div>
  `;
  el.innerHTML = html;

  createChart('fcTempCh', getChartConfig('line', datesShort, [
    { label: 'Max °C', data: d.temperature_2m_max, borderColor: '#ef4444' },
    { label: 'Min °C', data: d.temperature_2m_min, borderColor: '#3b82f6' }
  ]));
  createChart('fcPrecCh', getChartConfig('bar', datesShort, [
    { label: 'mm', data: d.precipitation_sum, backgroundColor: '#3b82f6' }
  ]));

  selectForecastDay(0, document.querySelector('.day-card'));
}

function selectForecastDay(dayIdx, element) {
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
  if(element) element.classList.add('selected');

  const targetDate = _fcData.daily.time[dayIdx];
  const hr = _fcData.hourly;
  const labels = []; const temp = []; const prec = [];

  for(let i=0; i<hr.time.length; i++) {
    if(hr.time[i].startsWith(targetDate)) {
      labels.push(hr.time[i].slice(11,16));
      temp.push(hr.temperature_2m[i]);
      prec.push(hr.precipitation[i]);
    }
  }

  $('fcDayDetail').innerHTML = `
    <div class="chart-container" style="border-color: var(--pri);">
      <h3>${targetDate} - ${t('chart24')}</h3>
      <div class="chart-wrapper"><canvas id="fcDayCh"></canvas></div>
    </div>
  `;

  createChart('fcDayCh', getChartConfig('line', labels, [
    { label: '°C', data: temp, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.2)', fill: true, tension: 0.3 },
    { label: 'mm', data: prec, type: 'bar', backgroundColor: '#3b82f6', yAxisID: 'y1' }
  ], true));

  $('fcDayDetail').scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

// ---- TAB 3: HISTORY ----
async function loadHistory() {
  const s = $('histStart').value; const e = $('histEnd').value;
  const el = $('histContent');
  if(!s || !e) { el.innerHTML = `<div class="err-msg">${t('errDates')}</div>`; return; }
  if(s > e) { el.innerHTML = `<div class="err-msg">${t('errRange')}</div>`; return; }

  el.innerHTML = `<div class="loader">${t('loading')}</div>`;
  try {
    const data = await fetchAPI(`https://archive-api.open-meteo.com/v1/archive?latitude=${currentCity.lat}&longitude=${currentCity.lon}&start_date=${s}&end_date=${e}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`);
    const d = data.daily;
    if(!d.time.length) throw new Error(t('errFetch'));

    const validMax = d.temperature_2m_max.filter(v=>v!=null);
    const validPrec = d.precipitation_sum.filter(v=>v!=null);
    const avgMax = validMax.length ? (validMax.reduce((a,b)=>a+b,0)/validMax.length).toFixed(1) : '-';
    const sumPrec = validPrec.length ? validPrec.reduce((a,b)=>a+b,0).toFixed(1) : '-';

    el.innerHTML = `
      <div class="grid-stats">
        <div class="stat-card"><div class="lbl">${t('days')}</div><div class="val">${d.time.length}</div></div>
        <div class="stat-card"><div class="lbl">${t('avgMax')}</div><div class="val" style="color:#ef4444">${avgMax}°C</div></div>
        <div class="stat-card"><div class="lbl">${t('totalPrec')}</div><div class="val" style="color:#3b82f6">${sumPrec} mm</div></div>
      </div>
      <div class="chart-container"><h3>${t('chartFcTemp')}</h3><div class="chart-wrapper"><canvas id="histTCh"></canvas></div></div>
      <div class="chart-container"><h3>${t('chartFcPrec')}</h3><div class="chart-wrapper"><canvas id="histPCh"></canvas></div></div>
    `;

    const labels = d.time.map(dt => dt.slice(5)); // Show MM-DD
    createChart('histTCh', getChartConfig('line', labels, [
      { label: 'Max °C', data: d.temperature_2m_max, borderColor: '#ef4444' },
      { label: 'Min °C', data: d.temperature_2m_min, borderColor: '#3b82f6' }
    ]));
    createChart('histPCh', getChartConfig('bar', labels, [
      { label: 'mm', data: d.precipitation_sum, backgroundColor: '#3b82f6' }
    ]));

  } catch(err) {
    el.innerHTML = `<div class="err-msg">${t('errFetch')}</div>`;
  }
}

// ---- TAB 4: AI PREDICTION ----
async function loadPrediction() {
  const ds = $('predDate').value;
  const el = $('predContent');
  if(!ds) return;
  el.innerHTML = `<div class="loader">${t('loading')}</div>`;

  try {
    const tgt = new Date(ds); const m = tgt.getMonth()+1; const d = tgt.getDate(); const curY = new Date().getFullYear();
    const promises = [];

    // Fetch 8 years of data around this date (±5 days for performance)
    for(let y = curY-8; y <= curY-1; y++) {
      const c = new Date(y, m-1, d);
      const s = new Date(c); s.setDate(s.getDate() - 5);
      const e = new Date(c); e.setDate(e.getDate() + 5);
      promises.push(
        fetchAPI(`https://archive-api.open-meteo.com/v1/archive?latitude=${currentCity.lat}&longitude=${currentCity.lon}&start_date=${s.toISOString().slice(0,10)}&end_date=${e.toISOString().slice(0,10)}&daily=temperature_2m_max,precipitation_sum&timezone=auto`)
        .then(res => ({year: y, data: res.daily}))
        .catch(() => null)
      );
    }

    const results = (await Promise.all(promises)).filter(Boolean);
    if(results.length < 2) throw new Error("Not enough historical data");

    // Algorithm: Calculate weighted average (Gaussian curve favoring exact day)
    let totalW = 0; let sumMax = 0; let sumPrec = 0;
    const yearAverages = [];

    results.forEach(res => {
      let yrW = 0; let yrMax = 0; let yrPrec = 0;
      res.data.time.forEach((timeStr, idx) => {
        const diffDays = Math.abs(new Date(timeStr) - new Date(`${res.year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`)) / 864e5;
        const weight = Math.exp(-(diffDays*diffDays)/18); // Sigma=3

        if(res.data.temperature_2m_max[idx] != null) {
          yrW += weight;
          yrMax += res.data.temperature_2m_max[idx] * weight;
          yrPrec += (res.data.precipitation_sum[idx] || 0) * weight;
        }
      });
      if(yrW > 0) {
        yearAverages.push({year: res.year, max: yrMax/yrW, prec: yrPrec/yrW});
        // Give slight preference to recent years (Exponential decay logic)
        const recencyWeight = Math.pow(1.2, res.year - (curY-8));
        totalW += recencyWeight;
        sumMax += (yrMax/yrW) * recencyWeight;
        sumPrec += (yrPrec/yrW) * recencyWeight;
      }
    });

    const finalMax = (sumMax / totalW).toFixed(1);
    const finalPrec = (sumPrec / totalW).toFixed(1);

    // Simple Linear Regression for Trend
    let sx=0, sy=0, sxy=0, sx2=0; const n = yearAverages.length;
    yearAverages.forEach(ya => { sx+=ya.year; sy+=ya.max; sxy+=ya.year*ya.max; sx2+=ya.year*ya.year; });
    const slope = (n*sxy - sx*sy) / (n*sx2 - sx*sx);

    // Std Deviation for Confidence
    const mean = yearAverages.reduce((a,b)=>a+b.max,0)/n;
    const sd = Math.sqrt(yearAverages.reduce((a,b)=>a+Math.pow(b.max-mean,2),0)/n).toFixed(1);

    el.innerHTML = `
      <div class="grid-stats" style="margin-top:0">
        <div class="stat-card" style="border-color:var(--pri)"><div class="lbl">AI Predict Max</div><div class="val" style="font-size:1.8rem;color:#ef4444">${finalMax}°C</div></div>
        <div class="stat-card" style="border-color:var(--pri)"><div class="lbl">AI Predict Precip</div><div class="val" style="font-size:1.8rem;color:#3b82f6">${finalPrec} mm</div></div>
        <div class="stat-card"><div class="lbl">${t('predTrend')}</div><div class="val">${slope>0?'📈 +':'📉 '}${slope.toFixed(2)}°/yr</div></div>
        <div class="stat-card"><div class="lbl">${t('predSpread')}</div><div class="val">±${sd}°C</div></div>
      </div>

      <div class="chart-container"><h3>${t('avgMax')} (Historical exact day context)</h3><div class="chart-wrapper"><canvas id="predCh"></canvas></div></div>
    `;

    createChart('predCh', getChartConfig('bar', yearAverages.map(y=>y.year), [
      { label: '°C', data: yearAverages.map(y=>y.max.toFixed(1)), backgroundColor: 'rgba(239,68,68,0.7)' }
    ]));

  } catch(err) {
    el.innerHTML = `<div class="err-msg">${t('errFetch')}</div>`;
  }
}
