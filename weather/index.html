<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌤️ World Weather</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f0f4f8;--card:#fff;--pri:#2563eb;--tx:#1e293b;--tx2:#475569;--tx3:#94a3b8;--bor:#e2e8f0;--hov:#f8fafc;--r:14px}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--tx:#f1f5f9;--tx2:#cbd5e1;--tx3:#94a3b8;--bor:#334155;--hov:#334155}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:.3s}
.hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f,#2563eb);color:#fff;padding:1.5rem;text-align:center;position:relative}
.hdr h1{font-size:1.8rem}.hdr p{opacity:.8;font-size:.9rem}
.hdr-btns{position:absolute;top:.8rem;right:.8rem;display:flex;gap:.5rem}
.hdr-btns select, .hdr-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:.4rem;cursor:pointer;outline:none}
.hdr-btns select option{background:#1e293b;color:#fff}
.wrap{max-width:900px;margin:0 auto;padding:0 1rem 2rem}
.sel-bar{background:var(--card);border-radius:var(--r);padding:.8rem;margin-top:-1.2rem;position:relative;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.1);display:flex;gap:.5rem;flex-wrap:wrap}
.sel-bar select, .sw input{padding:.5rem;border:2px solid var(--bor);border-radius:8px;background:var(--hov);color:var(--tx);outline:none;flex:1}
.sw{position:relative;flex:2;min-width:150px}
.dd{position:absolute;top:100%;left:0;right:0;background:var(--card);border:2px solid var(--bor);border-radius:0 0 10px 10px;max-height:300px;overflow-y:auto;display:none;z-index:200}
.dd.open{display:block}
.dd-i{padding:.6rem;cursor:pointer;font-size:.85rem;display:flex;justify-content:space-between;border-bottom:1px solid var(--bor)}
.dd-i:hover{background:var(--pri);color:#fff}
.tabs{display:flex;gap:.3rem;margin-top:1rem;flex-wrap:wrap}
.tbtn{padding:.6rem 1rem;border:none;background:var(--bor);border-radius:10px 10px 0 0;font-weight:bold;cursor:pointer;color:var(--tx3)}
.tbtn.on{background:var(--card);color:var(--pri)}
.pnl{background:var(--card);border-radius:0 var(--r) var(--r) var(--r);padding:1.2rem;display:none;min-height:200px}
.pnl.on{display:block}
.cw{text-align:center}.cw-ic{font-size:4rem}.cw-t{font-size:3rem;font-weight:bold}.cw-d{color:var(--tx3)}
.grd{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.5rem;margin-top:1rem}
.gd{background:var(--hov);border-radius:10px;padding:.5rem;text-align:center;font-size:.85rem}
.cb{background:var(--hov);border-radius:12px;padding:.8rem;margin-top:1rem}.cb canvas{max-height:200px!important;width:100%!important}
.hr-scroll{display:flex;gap:.5rem;overflow-x:auto;padding:.5rem 0}.hr{background:var(--card);padding:.4rem;border-radius:8px;text-align:center;min-width:50px;border:1px solid var(--bor);font-size:.8rem}
.fc-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.5rem}.fc{background:var(--hov);border-radius:10px;padding:.5rem;text-align:center;font-size:.8rem}
.ctrl{display:flex;gap:.5rem;margin-bottom:1rem}.ctrl input{padding:.5rem;border-radius:8px;border:1px solid var(--bor);background:var(--hov);color:var(--tx)}
.btn{padding:.5rem 1rem;background:var(--pri);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
table{width:100%;border-collapse:collapse;margin-top:1rem;font-size:.8rem}th,td{padding:.4rem;border-bottom:1px solid var(--bor);text-align:center}
</style>
</head>
<body>
<div class="hdr">
<div class="hdr-btns">
<select id="langSel" onchange="changeLang(this.value)">
<option value="en">🇬🇧 EN</option><option value="uk">🇺🇦 UK</option><option value="de">🇩🇪 DE</option>
<option value="fr">🇫🇷 FR</option><option value="es">🇪🇸 ES</option><option value="pl">🇵🇱 PL</option>
</select>
<button class="hdr-btn" onclick="toggleTheme()">🌓</button>
</div>
<h1 id="tTitle">🌤️ World Weather</h1><p id="tSub">500+ Cities · Saved Memory · AI Predict</p>
</div>
<div class="wrap">
<div class="sel-bar">
<select id="cSel"></select>
<div class="sw"><input type="text" id="si" placeholder="Search city..."><div class="dd" id="dd"></div></div>
</div>
<div class="tabs">
<button class="tbtn on" data-t="cur" id="tb1">🌡️ Now</button><button class="tbtn" data-t="fc" id="tb2">📅 14 Days</button>
<button class="tbtn" data-t="hist" id="tb3">📜 History</button><button class="tbtn" data-t="pred" id="tb4">🔮 Predict</button>
</div>
<div class="pnl on" id="p-cur"><div id="o-cur"></div></div>
<div class="pnl" id="p-fc"><div id="o-fc"></div></div>
<div class="pnl" id="p-hist"><div class="ctrl"><input type="date" id="hS"><input type="date" id="hE"><button class="btn" onclick="loadHist()">Show</button></div><div id="o-hist"></div></div>
<div class="pnl" id="p-pred"><div class="ctrl"><input type="date" id="pD"><button class="btn" onclick="loadPred()">Predict</button></div><div id="o-pred"></div></div>
</div>

<script>
// Города (сокращено для скорости загрузки, можешь вставить полный массив из прошлых ответов)
const RD=[
["UA","🇺🇦","Ukraine","Україна",{"Київська":"Київ,50.45,30.52;Біла Церква,49.8,30.11","Львівська":"Львів,49.84,24.03","Одеська":"Одеса,46.48,30.72"}],
["PL","🇵🇱","Poland","Польща",{"Poland":"Warsaw,52.23,21.01;Kraków,50.06,19.94"}],
["DE","🇩🇪","Germany","Німеччина",{"Germany":"Berlin,52.52,13.41;Munich,48.14,11.58"}]
];
const CITIES=[]; const COUNTRIES=[];
RD.forEach((c,idx)=>{
  COUNTRIES.push({id:idx, flag:c[1], en:c[2], uk:c[3]});
  Object.entries(c[4]).forEach(([r,cs])=>cs.split(';').forEach(x=>{const p=x.split(',');CITIES.push({n:p[0],la:+p[1],lo:+p[2],r,cid:idx})}));
});

let city=CITIES[0], curCId=0, tab='cur', lang=localStorage.getItem('lang')||'en', charts={};
const WI={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',95:'⛈️'};
const WIC=c=>WI[c]||'☁️';
const $=id=>document.getElementById(id);

const TR={
en:{now:'Now',fc:'14 Days',hi:'History',pr:'Predict',tmp:'Temp',feel:'Feels',hum:'Humidity',wnd:'Wind',prec:'Precip',srch:'Search...'},
uk:{now:'Зараз',fc:'14 Днів',hi:'Історія',pr:'Прогноз',tmp:'Темп',feel:'Відчут',hum:'Волога',wnd:'Вітер',prec:'Опади',srch:'Пошук...'}
};
function t(k){return (TR[lang]&&TR[lang][k])?TR[lang][k]:(TR['en'][k]||k)}

function changeLang(l){lang=l;localStorage.setItem('lang',l);applyUI();loadTab()}
function applyUI(){
  $('langSel').value=lang; $('tb1').textContent='🌡️ '+t('now'); $('tb2').textContent='📅 '+t('fc');
  $('tb3').textContent='📜 '+t('hi'); $('tb4').textContent='🔮 '+t('pr'); $('si').placeholder=t('srch');

  const sel=$('cSel'); sel.innerHTML='';
  COUNTRIES.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.flag+' '+(lang==='uk'?c.uk:c.en);sel.appendChild(o)});
  sel.value=curCId;
}

function initSearch(){
  $('cSel').onchange=e=>{curCId=+e.target.value; $('si').value=''; buildDD('')};
  const si=$('si'), dd=$('dd');
  si.onfocus=()=>buildDD(''); si.oninput=()=>buildDD(si.value);
  dd.onmousedown=e=>{const i=e.target.closest('.dd-i');if(i){city=CITIES[i.dataset.i];localStorage.setItem('savedCity',city.n);si.value=city.n;dd.classList.remove('open');loadTab()}};
  document.onclick=e=>{if(!e.target.closest('.sw'))dd.classList.remove('open')};
}
function buildDD(fl){
  fl=fl.toLowerCase(); let h='';
  CITIES.forEach((c,i)=>{if(c.cid===curCId && c.n.toLowerCase().includes(fl)) h+=`<div class="dd-i" data-i="${i}"><b>${c.n}</b> <span>${c.r}</span></div>`});
  $('dd').innerHTML=h||'<div style="padding:1rem;text-align:center">😕</div>'; $('dd').classList.add('open');
}

function chartOpt(){
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  const cTxt=dk?'#f1f5f9':'#1e293b'; // Идеальный контраст цифр!
  const cGrid=dk?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.1)';
  return {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:cTxt}}},scales:{x:{ticks:{color:cTxt},grid:{color:cGrid}},y:{ticks:{color:cTxt},grid:{color:cGrid}}}};
}
function mkCh(id,cfg){if(charts[id])charts[id].destroy();const cv=$(id);if(cv)charts[id]=new Chart(cv,cfg)}

async function loadCur(){
  const el=$('o-cur'); el.innerHTML='⏳...';
  const d=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.la}&longitude=${city.lo}&current=temperature_2m,apparent_temperature,wind_speed_10m,precipitation,weather_code,relative_humidity_2m&hourly=temperature_2m,precipitation,weather_code&timezone=auto`).then(r=>r.json());
  const hr=d.hourly; const lb=[], tm=[], pr=[];
  for(let i=0;i<24;i++){lb.push(hr.time[i].slice(11,16)); tm.push(hr.temperature_2m[i]); pr.push(hr.precipitation[i])} // Только 24 часа!

  el.innerHTML=`<div class="cw"><div class="cw-ic">${WIC(d.current.weather_code)}</div><div class="cw-t">${Math.round(d.current.temperature_2m)}°C</div><div>${city.n}</div></div>
  <div class="grd">
    <div class="gd">🌡️ ${t('feel')}<br><b>${d.current.apparent_temperature}°</b></div>
    <div class="gd">💨 ${t('wnd')}<br><b>${d.current.wind_speed_10m}</b></div>
    <div class="gd">💧 ${t('hum')}<br><b>${d.current.relative_humidity_2m}%</b></div>
    <div class="gd">🌧️ ${t('prec')}<br><b>${d.current.precipitation}mm</b></div>
  </div>
  <div class="cb"><h3>📈 ${t('tmp')} 24h</h3><canvas id="c1"></canvas></div>`;
  mkCh('c1',{type:'line',data:{labels:lb,datasets:[{label:'°C',data:tm,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.2)',fill:true},{label:'mm',data:pr,type:'bar',backgroundColor:'#3b82f6',yAxisID:'y1'}]},options:{...chartOpt(),scales:{...chartOpt().scales,y1:{position:'right',ticks:{color:chartOpt().scales.x.ticks.color}}}}});
}

function switchTab(tb){tab=tb;document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('on',b.dataset.t===tb));document.querySelectorAll('.pnl').forEach(p=>p.classList.toggle('on',p.id==='p-'+tb));loadTab()}
function loadTab(){if(tab==='cur')loadCur();}
function toggleTheme(){const dk=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',dk?'':'dark');localStorage.setItem('theme',dk?'light':'dark');loadTab()}

document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');
  applyUI(); initSearch();
  const saved=localStorage.getItem('savedCity');
  if(saved){const f=CITIES.find(c=>c.n===saved);if(f){city=f;curCId=f.cid;$('cSel').value=curCId;}}
  $('si').value=city.n;
  document.querySelectorAll('.tbtn').forEach(b=>b.onclick=()=>switchTab(b.dataset.t));
  loadCur();
});
</script>
</body>
</html>
