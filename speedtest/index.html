<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Pro Speed Test</title>
<style>
:root{--bg:#111827;--card:#1f2937;--pri:#3b82f6;--tx:#f3f4f6;--tx2:#9ca3af;--bor:#374151;--grn:#10b981;--red:#ef4444}
[data-theme="light"]{--bg:#f0f4f8;--card:#fff;--tx:#1e293b;--tx2:#475569;--bor:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:var(--bg);color:var(--tx);transition:.3s}
.wrap{max-width:800px;margin:2rem auto;padding:0 1rem}
.card{background:var(--card);border-radius:12px;padding:1.5rem;margin-bottom:1rem;border:1px solid var(--bor);box-shadow:0 8px 30px rgba(0,0,0,.1)}
.res{display:flex;justify-content:space-around;text-align:center;margin:2rem 0;font-size:1.2rem}
.val{font-size:3rem;font-weight:bold;color:var(--pri)}
.btn{display:block;width:100%;padding:1rem;background:var(--pri);color:#fff;border:none;border-radius:8px;font-size:1.2rem;cursor:pointer;margin-bottom:1rem;font-weight:bold}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem;margin-top:1rem}
.srv{background:rgba(128,128,128,.1);padding:.6rem;border-radius:8px;display:flex;justify-content:space-between;font-size:.85rem;align-items:center}
.up{color:var(--grn);font-weight:bold}.err{color:var(--red);font-size:.75rem}
.head-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
select, .t-btn{background:var(--card);color:var(--tx);border:1px solid var(--bor);padding:.5rem;border-radius:6px;cursor:pointer}
#ipInfo{background:rgba(128,128,128,.1);padding:1rem;border-radius:8px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
<div class="head-bar">
    <h1 id="tTitle">⚡ Speed & Status</h1>
    <div>
      <select id="langSel" onchange="changeLang(this.value)">
          <option value="en">🇬🇧 EN</option><option value="uk">🇺🇦 UK</option><option value="ru">🇷🇺 RU</option>
      </select>
      <button class="t-btn" onclick="toggleTheme()">🌓</button>
    </div>
</div>

<div class="card">
    <button class="btn" id="startBtn" onclick="runTest()">▶ Start Test</button>
    <div class="res">
        <div><div id="tD">Down</div><div class="val" id="rD">-</div>Mbps</div>
        <div><div id="tU">Up</div><div class="val" id="rU">-</div>Mbps</div>
        <div><div id="tP">Ping</div><div class="val" id="rP">-</div>ms</div>
    </div>
</div>

<div class="card">
    <h3>🌍 IP & Provider</h3>
    <div id="ipInfo">Loading...</div>
</div>

<div class="card">
    <h3>🌐 Services Status</h3>
    <div class="grid" id="srvGrid"></div>
</div>
</div>

<script>
const TR={
    en:{start:'▶ Start Test',run:'⏳ Testing...',d:'Down',u:'Up',p:'Ping',errT:'Timeout',errD:'Blocked/DNS'},
    uk:{start:'▶ Почати',run:'⏳ Тестування...',d:'Завант.',u:'Вивант.',p:'Пінг',errT:'Таймаут',errD:'Блок/DNS'},
    ru:{start:'▶ Начать',run:'⏳ Тестируем...',d:'Скач.',u:'Отдача',p:'Пинг',errT:'Таймаут',errD:'Блок/DNS'}
};
let lang=localStorage.getItem('stLang')||'en';
const $=id=>document.getElementById(id);
const t=k=>TR[lang][k];

function toggleTheme(){const dk=document.documentElement.getAttribute('data-theme')==='light';document.documentElement.setAttribute('data-theme',dk?'':'light');localStorage.setItem('stTheme',dk?'dark':'light')}
if(localStorage.getItem('stTheme')==='light')document.documentElement.setAttribute('data-theme','light');

function changeLang(l){lang=l;localStorage.setItem('stLang',l);applyUI();checkSrv()}
function applyUI(){
    $('langSel').value=lang; $('startBtn').textContent=t('start');
    $('tD').textContent=t('d'); $('tU').textContent=t('u'); $('tP').textContent=t('p');
}

// 1. IP & ISP
async function loadIP(){
    try{
        const r=await fetch('https://ipapi.co/json/'); const d=await r.json();
        $('ipInfo').innerHTML=`<b>IP:</b> ${d.ip} <br><b>ISP:</b> ${d.org} <br><b>Location:</b> ${d.city}, ${d.country_name}`;
    }catch(e){$('ipInfo').innerHTML='AdBlocker or privacy extension blocked IP check.';}
}

// 2. Services
const SRV=[
    {n:'Google',u:'https://www.google.com'}, {n:'YouTube',u:'https://www.youtube.com'},
    {n:'GitHub',u:'https://github.com'}, {n:'Cloudflare',u:'https://www.cloudflare.com'},
    {n:'AWS',u:'https://aws.amazon.com'}, {n:'ChatGPT',u:'https://openai.com'},
    {n:'Telegram',u:'https://web.telegram.org'}, {n:'Discord',u:'https://discord.com'},
    {n:'Steam',u:'https://store.steampowered.com'}, {n:'Netflix',u:'https://www.netflix.com'}
];
async function checkSrv(){
    const g=$('srvGrid'); g.innerHTML='';
    for(const s of SRV){const id='s-'+s.n.replace(/\s/g,''); g.innerHTML+=`<div class="srv"><span>${s.n}</span><span id="${id}">...</span></div>`;}
    for(const s of SRV){
        const st=performance.now(), id='s-'+s.n.replace(/\s/g,'');
        try{
            await Promise.race([fetch(s.u,{mode:'no-cors',cache:'no-store'}), new Promise((_,r)=>setTimeout(()=>r('T'),5000))]);
            $(id).innerHTML=`<span class="up">${Math.round(performance.now()-st)}ms</span>`;
        }catch(e){
            $(id).innerHTML=`<span class="err">${e==='T'?t('errT'):t('errD')}</span>`;
        }
    }
}

// 3. Speed Test
async function runTest(){
    $('startBtn').disabled=true; $('startBtn').textContent=t('run');
    $('rD').textContent='-'; $('rU').textContent='-'; $('rP').textContent='-';

    // Ping
    const s=performance.now();
    try{await fetch('https://speed.cloudflare.com/__down?bytes=1',{cache:'no-store'});}catch(e){}
    $('rP').textContent=Math.round(performance.now()-s);

    // Down (10MB)
    const dS=performance.now();
    try{await fetch('https://speed.cloudflare.com/__down?bytes=10000000',{cache:'no-store'});}catch(e){}
    $('rD').textContent=((10000000*8)/((performance.now()-dS)/1000)/1e6).toFixed(1);

    // Up (2MB с фиксом crypto)
    const data=new Uint8Array(2000000);
    for(let o=0;o<data.length;o+=65536) crypto.getRandomValues(new Uint8Array(data.buffer,o,Math.min(65536,data.length-o)));
    const uS=performance.now();
    try{await fetch('https://speed.cloudflare.com/__up',{method:'POST',body:data,cache:'no-store'});}catch(e){}
    $('rU').textContent=((2000000*8)/((performance.now()-uS)/1000)/1e6).toFixed(1);

    $('startBtn').disabled=false; $('startBtn').textContent=t('start');
}

applyUI(); loadIP(); checkSrv();
</script>
</body>
</html>
