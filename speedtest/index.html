<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ SpeedTest Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f0f4f8; --card: #ffffff; --pri: #3b82f6; --pri-hov: #2563eb;
    --tx: #1e293b; --tx2: #475569; --tx3: #94a3b8; --bor: #e2e8f0; --hov: #f8fafc;
    --shadow: 0 8px 30px rgba(0,0,0,0.08); --r: 16px;
    --grn: #10b981; --ylw: #f59e0b; --red: #ef4444;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --card: #1e293b; --pri: #3b82f6; --pri-hov: #60a5fa;
    --tx: #f8fafc; --tx2: #cbd5e1; --tx3: #64748b; --bor: #334155; --hov: #0f172a;
    --shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--tx); transition: background 0.3s, color 0.3s; min-height: 100vh; }

  /* Header */
  .hdr { background: linear-gradient(135deg, #0f172a, #1e3a8a, #3b82f6); color: white; padding: 1.8rem 1rem; text-align: center; position: relative; }
  .hdr h1 { font-size: 2.2rem; margin-bottom: 0.3rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
  .hdr p { opacity: 0.9; font-size: 1rem; }
  .controls { position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.5rem; }
  .controls select, .controls button { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 0.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; backdrop-filter: blur(5px); outline: none; }
  .controls select option { background: #1e293b; color: white; }
  .controls button:hover { background: rgba(255,255,255,0.3); }

  /* Main Wrapper */
  .wrap { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* Cards */
  .card { background: var(--card); border-radius: var(--r); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; border: 1px solid var(--bor); }
  .card h3 { font-size: 1.1rem; color: var(--tx2); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .btn-sm { font-size: 0.8rem; padding: 0.3rem 0.8rem; background: var(--hov); border: 1px solid var(--bor); border-radius: 6px; color: var(--tx2); cursor: pointer; transition: 0.2s; }
  .btn-sm:hover { background: var(--bor); color: var(--tx); }

  /* Gauge Area */
  .gauge-container { text-align: center; padding: 2rem 0 1rem; }
  .gauge-wrap { position: relative; width: 300px; height: 160px; margin: 0 auto; }
  .gauge-wrap canvas { width: 300px; height: 160px; display: block; }
  .gauge-val { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; }
  .gauge-num { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; color: var(--tx); }
  .gauge-unit { font-size: 0.9rem; color: var(--tx3); font-weight: bold; }

  .status-text { font-size: 0.95rem; color: var(--tx2); margin: 1rem 0; min-height: 1.2rem; font-weight: bold; }
  .progress-bar { height: 8px; background: var(--bor); border-radius: 4px; overflow: hidden; max-width: 400px; margin: 0 auto 1.5rem; display: none; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; transition: width 0.2s linear; }

  .start-btn { padding: 1rem 3rem; background: var(--pri); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
  .start-btn:hover { background: var(--pri-hov); transform: translateY(-2px); }
  .start-btn:disabled { background: var(--tx3); cursor: not-allowed; transform: none; box-shadow: none; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

  /* Results Grid */
  .res-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .res-box { background: var(--hov); padding: 1.2rem 0.5rem; border-radius: 12px; text-align: center; border: 1px solid var(--bor); }
  .res-ic { font-size: 1.8rem; margin-bottom: 0.3rem; }
  .res-val { font-size: 2rem; font-weight: 800; color: var(--tx); line-height: 1; margin-bottom: 0.2rem; }
  .res-lbl { font-size: 0.8rem; color: var(--tx3); text-transform: uppercase; font-weight: bold; }

  /* Info & Services */
  .info-text { font-size: 0.95rem; line-height: 1.6; color: var(--tx2); background: var(--hov); padding: 1rem; border-radius: 10px; border: 1px solid var(--bor); }

  .srv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
  .srv-item { display: flex; justify-content: space-between; align-items: center; background: var(--hov); padding: 0.6rem 0.8rem; border-radius: 8px; font-size: 0.85rem; border: 1px solid var(--bor); }
  .srv-name { display: flex; align-items: center; gap: 0.4rem; font-weight: 600; color: var(--tx); }
  .srv-stat { font-weight: bold; font-size: 0.8rem; }
  .s-up { color: var(--grn); } .s-warn { color: var(--ylw); } .s-down { color: var(--red); }

  /* Quality Assessment */
  .qos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.8rem; margin-top: 1rem; display: none; }
  .qos-box { padding: 1rem; border-radius: 10px; text-align: center; border: 1px solid var(--bor); }
  .qos-ic { font-size: 1.8rem; margin-bottom: 0.3rem; }
  .qos-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 0.2rem; color: var(--tx); }
  .qos-val { font-size: 0.85rem; font-weight: bold; }

  /* Chart */
  .chart-wrapper { position: relative; height: 200px; width: 100%; display: none; margin-top: 1rem; }

  @media (max-width: 600px) {
    .hdr h1 { font-size: 1.6rem; }
    .res-grid { grid-template-columns: 1fr 1fr; }
    .gauge-wrap { width: 250px; height: 135px; }
    .gauge-wrap canvas { width: 250px; height: 135px; }
    .gauge-num { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="controls">
    <select id="langSel" onchange="changeLang(this.value)">
      <option value="en">🇬🇧 EN</option><option value="uk">🇺🇦 UK</option>
      <option value="ru">🇷🇺 RU</option><option value="de">🇩🇪 DE</option>
    </select>
    <button onclick="toggleTheme()" title="Toggle Theme">🌓</button>
  </div>
  <h1 id="t_mainTitle">⚡ SpeedTest Pro</h1>
  <p id="t_subTitle">Download · Upload · Ping · Jitter · Services</p>
</div>

<div class="wrap">

  <!-- Gauge & Start -->
  <div class="card gauge-container">
    <div class="gauge-wrap">
      <canvas id="gaugeCanvas"></canvas>
      <div class="gauge-val">
        <div class="gauge-num" id="gaugeNum">0</div>
        <div class="gauge-unit">Mbps</div>
      </div>
    </div>

    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
    <div class="status-text" id="statusTxt">Press Start to begin</div>

    <button class="start-btn" id="btnStart" onclick="runSpeedTest()">▶ Start Test</button>
  </div>

  <!-- Results Grid -->
  <div class="res-grid">
    <div class="res-box"><div class="res-ic">⬇️</div><div class="res-val" id="rDown">—</div><div class="res-lbl" id="t_dl">Download</div><div style="font-size:0.7rem;color:var(--tx3)">Mbps</div></div>
    <div class="res-box"><div class="res-ic">⬆️</div><div class="res-val" id="rUp">—</div><div class="res-lbl" id="t_ul">Upload</div><div style="font-size:0.7rem;color:var(--tx3)">Mbps</div></div>
    <div class="res-box"><div class="res-ic">🏓</div><div class="res-val" id="rPing">—</div><div class="res-lbl">Ping</div><div style="font-size:0.7rem;color:var(--tx3)">ms</div></div>
    <div class="res-box"><div class="res-ic">📊</div><div class="res-val" id="rJitter">—</div><div class="res-lbl">Jitter</div><div style="font-size:0.7rem;color:var(--tx3)">ms</div></div>
  </div>

  <!-- Quality & Chart -->
  <div class="card" id="qosCard" style="display:none">
    <h3 id="t_qosTitle">📈 Network Quality</h3>
    <div class="chart-wrapper" id="chartWrap"><canvas id="speedChart"></canvas></div>
    <div class="qos-grid" id="qosGrid"></div>
  </div>

  <!-- Info & ISP -->
  <div class="card">
    <h3 id="t_ipTitle">🌍 IP & Provider Info</h3>
    <div class="info-text" id="ipInfo">Fetching details...</div>
  </div>

  <!-- Services Status -->
  <div class="card">
    <h3><span id="t_srvTitle">🌐 Services Availability</span> <button class="btn-sm" onclick="checkServices()" id="t_btnCheck">🔄 Check</button></h3>
    <div class="srv-grid" id="srvGrid"></div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════════════════════
   1. TRANSLATIONS & THEME
   ════════════════════════════════════════════════════════════ */
const TRANSLATIONS = {
  en: {
    mainTitle:'⚡ SpeedTest Pro', subTitle:'Download · Upload · Ping · Jitter · Services',
    dl:'Download', ul:'Upload', start:'▶ Start Test', running:'⏳ Testing...', done:'✅ Test Complete!',
    ipTitle:'🌍 IP & Provider Info', srvTitle:'🌐 Services Availability', btnCheck:'🔄 Check',
    qosTitle:'📈 Network Quality',
    errDNS:'Blocked / DNS', errTime:'Timeout',
    phPing:'🏓 Measuring Ping & Jitter...', phDown:'⬇️ Testing Download Speed...', phUp:'⬆️ Testing Upload Speed...',
    qosStream:'Streaming (4K/HD)', qosGame:'Online Gaming', qosVideo:'Video Calls', qosBrowse:'Web Browsing',
    exc:'Excellent', good:'Good', fair:'Fair', poor:'Poor'
  },
  uk: {
    mainTitle:'⚡ SpeedTest Pro', subTitle:'Завантаження · Віддача · Пінг · Джитер · Сервіси',
    dl:'Завант.', ul:'Віддача', start:'▶ Почати Тест', running:'⏳ Тестування...', done:'✅ Тест Завершено!',
    ipTitle:'🌍 Інформація про IP та Провайдера', srvTitle:'🌐 Доступність Сервісів', btnCheck:'🔄 Перевірити',
    qosTitle:'📈 Якість Мережі',
    errDNS:'Блок / DNS', errTime:'Таймаут',
    phPing:'🏓 Вимірювання Пінгу та Джитеру...', phDown:'⬇️ Тестування Завантаження...', phUp:'⬆️ Тестування Віддачі...',
    qosStream:'Стрімінг (4K/HD)', qosGame:'Онлайн Ігри', qosVideo:'Відеодзвінки', qosBrowse:'Серфінг в Інтернеті',
    exc:'Відмінно', good:'Добре', fair:'Задовільно', poor:'Погано'
  },
  ru: {
    mainTitle:'⚡ SpeedTest Pro', subTitle:'Скачивание · Отдача · Пинг · Джиттер · Сервисы',
    dl:'Скачивание', ul:'Отдача', start:'▶ Начать Тест', running:'⏳ Тестируем...', done:'✅ Тест Завершен!',
    ipTitle:'🌍 Информация об IP и Провайдере', srvTitle:'🌐 Доступность Сервисов', btnCheck:'🔄 Проверить',
    qosTitle:'📈 Качество Сети',
    errDNS:'Блок / DNS', errTime:'Таймаут',
    phPing:'🏓 Измерение Пинга и Джиттера...', phDown:'⬇️ Тестирование Скачивания...', phUp:'⬆️ Тестирование Отдачи...',
    qosStream:'Стриминг (4K/HD)', qosGame:'Онлайн Игры', qosVideo:'Видеозвонки', qosBrowse:'Серфинг в Интернете',
    exc:'Отлично', good:'Хорошо', fair:'Удовлетворительно', poor:'Плохо'
  }
};

let currentLang = localStorage.getItem('speedLang') || 'en';
const $ = id => document.getElementById(id);
function t(key) { return (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) ? TRANSLATIONS[currentLang][key] : (TRANSLATIONS['en'][key] || key); }

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('speedTheme', isDark ? 'light' : 'dark');
  drawGauge(currentGaugeVal); // Redraw gauge with correct colors
  if(chartInst) renderChart(); // Redraw chart
}

function changeLang(l) {
  currentLang = l; localStorage.setItem('speedLang', l);
  $('langSel').value = l;
  $('t_mainTitle').textContent = t('mainTitle'); $('t_subTitle').textContent = t('subTitle');
  $('t_dl').textContent = t('dl'); $('t_ul').textContent = t('ul');
  $('t_ipTitle').textContent = t('ipTitle'); $('t_srvTitle').textContent = t('srvTitle');
  $('t_btnCheck').innerHTML = t('btnCheck'); $('t_qosTitle').textContent = t('qosTitle');
  if(!isTesting) $('btnStart').textContent = t('start');
  if(!isTesting && currentGaugeVal===0) $('statusTxt').textContent = "Press Start to begin";
}

/* ════════════════════════════════════════════════════════════
   2. IP & SERVICES LOGIC
   ════════════════════════════════════════════════════════════ */
async function loadIPInfo() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if(d.error) throw new Error("API Limit");
    $('ipInfo').innerHTML = `
      <b>IP Address:</b> ${d.ip} <br>
      <b>Provider (ISP):</b> <span style="color:var(--pri);font-weight:bold">${d.org}</span> <br>
      <b>Location:</b> ${d.city}, ${d.region}, ${d.country_name} ${d.country_code} <br>
      <b>ASN:</b> ${d.asn}
    `;
  } catch(e) {
    $('ipInfo').innerHTML = 'AdBlocker or privacy extension blocked IP check. <br> Disable tracker blocking to see IP info.';
  }
}

const SERVICES = [
  {n:'Google', u:'https://www.google.com', i:'🔍'}, {n:'YouTube', u:'https://www.youtube.com', i:'▶️'},
  {n:'Cloudflare', u:'https://www.cloudflare.com', i:'☁️'}, {n:'GitHub', u:'https://github.com', i:'🐙'},
  {n:'AWS Amazon', u:'https://aws.amazon.com', i:'📦'}, {n:'OpenAI (GPT)', u:'https://openai.com', i:'🤖'},
  {n:'Telegram', u:'https://web.telegram.org', i:'✈️'}, {n:'Discord', u:'https://discord.com', i:'🎮'},
  {n:'Steam', u:'https://store.steampowered.com', i:'🎮'}, {n:'Netflix', u:'https://www.netflix.com', i:'🎬'},
  {n:'TikTok', u:'https://www.tiktok.com', i:'🎵'}, {n:'Spotify', u:'https://www.spotify.com', i:'🎶'},
  {n:'X / Twitter', u:'https://x.com', i:'🐦'}, {n:'Instagram', u:'https://www.instagram.com', i:'📷'},
  {n:'Zoom', u:'https://zoom.us', i:'📹'}, {n:'PayPal', u:'https://www.paypal.com', i:'💳'}
];

async function checkServices() {
  const grid = $('srvGrid'); grid.innerHTML = '';
  SERVICES.forEach(s => {
    const id = 's_' + s.n.replace(/[^a-zA-Z0-9]/g, '');
    grid.innerHTML += `<div class="srv-item"><div class="srv-name">${s.i} ${s.n}</div><div class="srv-stat" id="${id}">...</div></div>`;
  });

  for(const s of SERVICES) {
    const id = 's_' + s.n.replace(/[^a-zA-Z0-9]/g, '');
    const st = performance.now();
    try {
      await Promise.race([
        fetch(s.u, {mode:'no-cors', cache:'no-store'}),
        new Promise((_, r) => setTimeout(() => r('TIMEOUT'), 5000))
      ]);
      const time = Math.round(performance.now() - st);
      let cls = 's-up'; if(time > 800) cls = 's-warn'; if(time > 2000) cls = 's-down';
      $(id).innerHTML = `<span class="${cls}">${time} ms</span>`;
    } catch(e) {
      const errTxt = e === 'TIMEOUT' ? t('errTime') : t('errDNS');
      $(id).innerHTML = `<span class="s-down">${errTxt}</span>`;
    }
  }
}

/* ════════════════════════════════════════════════════════════
   3. GAUGE & CHART DRAWING
   ════════════════════════════════════════════════════════════ */
const canvas = $('gaugeCanvas'); const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;
canvas.width = 300 * DPR; canvas.height = 160 * DPR; ctx.scale(DPR, DPR);
let currentGaugeVal = 0; let chartInst = null; let speedLogDown = []; let speedLogUp = [];

function drawGauge(val, max = 200) {
  const w = 300, h = 160, cx = w/2, cy = h-15, r = 130;
  ctx.clearRect(0,0,w,h);

  // Background Arc
  ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, 2*Math.PI);
  ctx.strokeStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#334155' : '#e2e8f0';
  ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.stroke();

  // Colored Fill Arc
  const pct = Math.min(Math.max(val/max, 0), 1);
  if(pct > 0) {
    const grad = ctx.createLinearGradient(0,0,w,0);
    grad.addColorStop(0, '#10b981'); grad.addColorStop(0.4, '#eab308');
    grad.addColorStop(0.7, '#f97316'); grad.addColorStop(1, '#ef4444');
    ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI, Math.PI + (Math.PI * pct));
    ctx.strokeStyle = grad; ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.stroke();
  }
}

function updateGauge(target) {
  currentGaugeVal = target;
  drawGauge(target, 200);
  $('gaugeNum').textContent = target.toFixed(1);
}
drawGauge(0);

function renderChart() {
  if(chartInst) chartInst.destroy();
  const cvs = $('speedChart');
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const cTxt = isDark ? '#f8fafc' : '#1e293b';
  const cGrid = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

  chartInst = new Chart(cvs, {
    type: 'line',
    data: {
      labels: Array.from({length: Math.max(speedLogDown.length, speedLogUp.length)}, (_,i) => i+1),
      datasets: [
        { label: `⬇️ ${t('dl')} Mbps`, data: speedLogDown, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 },
        { label: `⬆️ ${t('ul')} Mbps`, data: speedLogUp, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: cTxt, font: {weight: 'bold'} } } },
      scales: { x: { ticks: { color: cTxt }, grid: { color: cGrid } }, y: { min: 0, ticks: { color: cTxt }, grid: { color: cGrid } } }
    }
  });
}

/* ════════════════════════════════════════════════════════════
   4. CORE SPEED TEST ENGINE
   ════════════════════════════════════════════════════════════ */
let isTesting = false;

async function runSpeedTest() {
  if(isTesting) return; isTesting = true;
  speedLogDown = []; speedLogUp = [];

  const btn = $('btnStart');
  btn.disabled = true; btn.textContent = t('running');

  ['rDown', 'rUp', 'rPing', 'rJitter'].forEach(id => { $(id).textContent = '...'; $(id).style.color = ''; });
  $('qosCard').style.display = 'none'; $('chartWrap').style.display = 'none';
  $('progBar').style.display = 'block'; $('progFill').style.width = '0%';

  try {
    // 1. PING & JITTER
    $('statusTxt').textContent = t('phPing');
    $('progFill').style.width = '10%';
    const pings = [];
    for(let i=0; i<10; i++) {
      const s = performance.now();
      try{ await fetch(`https://speed.cloudflare.com/__down?bytes=1&_=${Date.now()}`, {cache:'no-store', mode:'cors'}); }
      catch(e){ await fetch(`https://www.google.com/favicon.ico?_=${Date.now()}`, {mode:'no-cors', cache:'no-store'}); }
      pings.push(performance.now() - s);
    }
    pings.sort((a,b)=>a-b);
    const ping = Math.round(pings[Math.floor(pings.length/2)]); // Median
    const jitter = Math.round(pings.reduce((acc, val, i, arr) => i>0 ? acc + Math.abs(val - arr[i-1]) : acc, 0) / (pings.length - 1));

    $('rPing').textContent = ping; $('rPing').style.color = ping < 40 ? 'var(--grn)' : ping < 100 ? 'var(--ylw)' : 'var(--red)';
    $('rJitter').textContent = jitter; $('rJitter').style.color = jitter < 15 ? 'var(--grn)' : jitter < 30 ? 'var(--ylw)' : 'var(--red)';

    // 2. DOWNLOAD
    $('statusTxt').textContent = t('phDown');
    const dlSizes = [500000, 1000000, 2000000, 5000000, 10000000, 25000000]; // 0.5MB to 25MB
    let dlBytes = 0, dlTime = 0;

    for(let i=0; i<dlSizes.length; i++) {
      $('progFill').style.width = (20 + (i * 8)) + '%';
      const size = dlSizes[i];
      const start = performance.now();
      try {
        const resp = await fetch(`https://speed.cloudflare.com/__down?bytes=${size}&_=${Date.now()}`, {cache:'no-store'});
        const reader = resp.body.getReader();
        let chunkBytes = 0;
        while(true) {
          const {done, value} = await reader.read();
          if(done) break; chunkBytes += value.length;
          const elapsed = (performance.now() - start)/1000;
          if(elapsed > 0) {
            const currentSpeed = (chunkBytes * 8 / elapsed) / 1e6;
            updateGauge(currentSpeed);
          }
        }
        const finalElapsed = (performance.now() - start)/1000;
        dlBytes += chunkBytes; dlTime += finalElapsed;
        speedLogDown.push((chunkBytes * 8 / finalElapsed) / 1e6);
      } catch(e) {
        // Fallback for CORS blocks
        const fbStart = performance.now();
        const fbResp = await fetch(`https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js?_=${Date.now()}`, {cache:'no-store'});
        const blob = await fbResp.blob();
        dlBytes += blob.size; dlTime += (performance.now() - fbStart)/1000;
      }
    }
    const finalDlSpeed = dlTime > 0 ? (dlBytes * 8 / dlTime) / 1e6 : 0;
    $('rDown').textContent = finalDlSpeed.toFixed(1);
    $('rDown').style.color = finalDlSpeed > 50 ? 'var(--grn)' : finalDlSpeed > 10 ? 'var(--ylw)' : 'var(--red)';

    // 3. UPLOAD (With crypto fix)
    $('statusTxt').textContent = t('phUp');
    const ulSizes = [256000, 512000, 1000000, 2000000, 4000000]; // 256KB to 4MB
    let ulBytes = 0, ulTime = 0;

    for(let i=0; i<ulSizes.length; i++) {
      $('progFill').style.width = (70 + (i * 6)) + '%';
      const size = ulSizes[i];
      const data = new Uint8Array(size);
      // Fix for crypto 65536 bytes limit
      for(let offset=0; offset<data.length; offset+=65536) {
        crypto.getRandomValues(new Uint8Array(data.buffer, offset, Math.min(65536, data.length - offset)));
      }
      const blob = new Blob([data]);
      const start = performance.now();
      try {
        await fetch(`https://speed.cloudflare.com/__up?_=${Date.now()}`, {method:'POST', body:blob, cache:'no-store'});
        const elapsed = (performance.now() - start)/1000;
        ulBytes += size; ulTime += elapsed;
        const curSpeed = (size * 8 / elapsed) / 1e6;
        updateGauge(curSpeed);
        speedLogUp.push(curSpeed);
      } catch(e) { ulBytes += size; ulTime += 2; } // Penalty for fail
    }
    const finalUlSpeed = ulTime > 0 ? (ulBytes * 8 / ulTime) / 1e6 : 0;
    $('rUp').textContent = finalUlSpeed.toFixed(1);
    $('rUp').style.color = finalUlSpeed > 20 ? 'var(--grn)' : finalUlSpeed > 5 ? 'var(--ylw)' : 'var(--red)';

    // FINISH
    $('progFill').style.width = '100%';
    $('statusTxt').textContent = t('done');
    updateGauge(0);

    calcQoS(finalDlSpeed, finalUlSpeed, ping, jitter);
    $('qosCard').style.display = 'block';
    $('chartWrap').style.display = 'block';
    renderChart();

  } catch(err) {
    $('statusTxt').textContent = `❌ Error: ${err.message}`;
  }

  btn.disabled = false; btn.textContent = t('start');
  isTesting = false;
  setTimeout(()=>$('progBar').style.display='none', 2000);
}

/* ════════════════════════════════════════════════════════════
   5. QoS (Quality of Service)
   ════════════════════════════════════════════════════════════ */
function calcQoS(dl, ul, ping, jit) {
  const R = (v, limits) => {
    if(v >= limits[0]) return {t:t('exc'), c:'var(--grn)', ic:'🟢'};
    if(v >= limits[1]) return {t:t('good'), c:'var(--grn)', ic:'🟢'};
    if(v >= limits[2]) return {t:t('fair'), c:'var(--ylw)', ic:'🟡'};
    return {t:t('poor'), c:'var(--red)', ic:'🔴'};
  };
  const R_INV = (v, limits) => {
    if(v <= limits[0]) return {t:t('exc'), c:'var(--grn)', ic:'🟢'};
    if(v <= limits[1]) return {t:t('good'), c:'var(--grn)', ic:'🟢'};
    if(v <= limits[2]) return {t:t('fair'), c:'var(--ylw)', ic:'🟡'};
    return {t:t('poor'), c:'var(--red)', ic:'🔴'};
  };

  const stream = R(dl, [25, 10, 5]); // 4K needs 25, HD needs 5
  const gaming = R_INV(ping + jit, [40, 80, 150]); // Total latency
  const video = (ul >= 5 && ping < 60) ? {t:t('exc'), c:'var(--grn)', ic:'🟢'} : (ul >= 2 && ping < 120) ? {t:t('good'), c:'var(--grn)', ic:'🟢'} : {t:t('fair'), c:'var(--ylw)', ic:'🟡'};
  const browse = R(dl, [15, 5, 2]);

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const bg = isDark ? 'var(--hov)' : '#f8fafc';

  $('qosGrid').innerHTML = `
    <div class="qos-box" style="background:${bg}"><div class="qos-ic">🎬</div><div class="qos-title">${t('qosStream')}</div><div class="qos-val" style="color:${stream.c}">${stream.ic} ${stream.t}</div></div>
    <div class="qos-box" style="background:${bg}"><div class="qos-ic">🎮</div><div class="qos-title">${t('qosGame')}</div><div class="qos-val" style="color:${gaming.c}">${gaming.ic} ${gaming.t}</div></div>
    <div class="qos-box" style="background:${bg}"><div class="qos-ic">📹</div><div class="qos-title">${t('qosVideo')}</div><div class="qos-val" style="color:${video.c}">${video.ic} ${video.t}</div></div>
    <div class="qos-box" style="background:${bg}"><div class="qos-ic">🌐</div><div class="qos-title">${t('qosBrowse')}</div><div class="qos-val" style="color:${browse.c}">${browse.ic} ${browse.t}</div></div>
  `;
}

  $('langSel').value = currentLang;
